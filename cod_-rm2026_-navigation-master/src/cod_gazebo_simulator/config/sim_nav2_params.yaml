# Nav2 仿真参数 — 基于 COD 真实参数适配
# 仿真中使用 Gazebo 提供的 ground-truth /Odometry (无需 small_point_lio)

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /Odometry
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_entire_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "pb_omni_pid_pursuit_controller::OmniPidPursuitController"
      translation_kp: 1.5
      translation_ki: 0.0
      translation_kd: 0.0
      rotation_kp: 2.0
      rotation_ki: 0.0
      rotation_kd: 0.0
      v_linear_max: 2.5
      v_linear_min: -2.5
      v_angular_max: 2.0
      v_angular_min: -2.0
      lookahead_dist: 0.5

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: False
      allow_unknown: True

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: True
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.3
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        max_obstacle_height: 2.0
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 10
        mark_threshold: 0
        observation_sources: "lidar_scan"
        lidar_scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          expected_update_rate: 0.3

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 0.5
      rolling_window: False
      resolution: 0.05
      robot_radius: 0.3
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        max_obstacle_height: 2.0
        observation_sources: "lidar_scan"
        lidar_scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          expected_update_rate: 0.3

behavior_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 30.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [2.5, 2.5, 2.5]
    min_velocity: [-2.5, -2.5, -2.5]
    deadband_velocity: [0.05, 0.05, 0.05]
    velocity_timeout: 1.0
    max_accel: [2.5, 2.5, 1.5]
    max_decel: [-3.5, -3.5, -3.0]
    odom_topic: "/Odometry"

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000

waypoint_follower:
  ros__parameters:
    use_sim_time: True

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_collision_safe"
    transform_tolerance: 0.1
    source_timeout: 0.3
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["StopZone"]
    StopZone:
      type: "polygon"
      points: [0.55, 0.55, 0.55, -0.55, -0.55, -0.55, -0.55, 0.55]
      action_type: "stop"
      max_points: 1
      visualize: True
      polygon_pub_topic: "collision_monitor/stop_zone"
      enabled: True
    observation_sources: ["livox"]
    livox:
      type: "pointcloud"
      topic: "/livox/lidar_filtered"
      min_height: 0.05
      max_height: 1.0
      enabled: True

lidar_cmd_watchdog:
  ros__parameters:
    use_sim_time: True
    cloud_topic: "/livox/lidar_filtered"
    cmd_vel_in_topic: "cmd_vel_collision_safe"
    cmd_vel_out_topic: "cmd_vel"
    cloud_timeout: 0.3
    check_rate: 20.0
