controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 50.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 999.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30 #放宽到25cm，高速omni机器人10cm太严导致绕圈
      yaw_goal_tolerance: 6.28
    FollowPath:
      plugin: "goal_approach_controller::GoalApproachController"
      inner_plugin: "nav2_mppi_controller::MPPIController"
      approach_distance: 2.5  #距目标时开始限速
      approach_velocity: 0.2
      time_steps: 80  #增加到80，预测时域4.8s，让MPPI能看到冲过目标的后果
      model_dt: 0.06  #稍微放大步长，配合time_steps延长预测时域
      batch_size: 1500 #控制器的采样数。

      vx_std: 0.35 #增大采样多样性，让MPPI能采到更多减速/停止轨迹
      vy_std: 0.35
      wz_std: 0.2

      vx_max: 2.5
      vy_max: 2.5
      wz_max: 1.5

      vx_min: -2.5
      vy_min: -2.5
      wz_min: -1.5

      ax_max: 1.5 #加速度提高，高速时能快速响应
      ay_max: 1.5
      az_max: 3.0

      ax_min: -3.5 #关键：制动力必须对称，高速下刹得住
      ay_min: -3.5
      az_min: -3.0

      iteration_count: 1
      prune_distance: 1.7 #高速下提前剪枝已通过的路径点
      transform_tolerance: 0.1
      temperature: 0.25 #大幅降低：让 MPPI 更果断选最优轨迹，不在次优之间摇摆
      gamma: 0.015 #稍微提高正则化，减少激进抖动
      motion_model: "Omni" #控制器的运动模型。
      visualize: false #是否可视化。
      reset_period: 0.08 # (only in Humble)
      retry_attempt_limit: 2 #软重置的尝试次数
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5 #是指在可视化轨迹时，每隔多少个轨迹点绘制一个点。
        time_step: 3 #是指在可视化轨迹时，每隔多少个时间步长绘制一个点。
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathFollowCritic", "PathAlignCritic", "ObstaclesCritic"]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic: #必须开启，否则机器人没有到达目标的动力
        enabled: true
        cost_power: 1
        cost_weight: 20.0 #配合二次惩罚适当调整权重
        threshold_to_consider: 3.0

      ObstaclesCritic: #开启提供额外的障碍物排斥力
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5 #排斥权重
        critical_weight: 20.0 #近距离障碍物惩罚
        consider_footprint: false #用圆形近似，omni机器人更高效
        collision_cost: 10000.0
        collision_margin_distance: 0.25 #碰撞边界余量
        near_goal_distance: 0.1

      CostCritic: #通过 costmap 梯度引导避障
        enabled: true
        cost_power: 1
        cost_weight: 3.8 #适当降低，配合修正后的 inflation 梯度
        critical_cost: 253.0 #关键修正！只有 inscribed/lethal 才触发碰撞惩罚，不再把整个膨胀区都当碰撞
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2

      PathFollowCritic: #必须开启，这是防止乱跑的核心
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        offset_from_furthest: 5 #关注路径前方更远的点
        threshold_to_consider: 3.0 #缩小关闭距离，让路径跟随一直引导到接近目标，防止圆周运动

      PathAlignCritic: #让轨迹方向与路径对齐，高速下更平滑
        enabled: true
        cost_power: 1
        cost_weight: 15.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 3.0 #与PathFollowCritic同步，在接近目标前持续提供方向引导
        offset_from_furthest: 20
        use_path_orientations: false #omni机器人用运动方向而非朝向

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0
      publish_frequency: 20.0
      global_frame: odom
      robot_base_frame: base_link_fake
      use_sim_time: False
      rolling_window: true
      width: 10 
      height: 10
      resolution: 0.05
      robot_radius: 0.2
      footprint: "[ [0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15] ]"
      plugins: ["static_layer","stvl_voxel_layer","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0 #关键修正！原0.3衰减太慢，整个膨胀区代价都极高，MPPI没有梯度可用。5.0让代价快速衰减，形成清晰的"远离障碍物"梯度
        inflation_radius: 0.75 #加大膨胀半径，高速下需要更早看到障碍物
      stvl_voxel_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 1.0     #seconds if linear, e^n if exponential
        decay_model: 0      #0=linear, 1=exponential, 2=persistent
        voxel_size: 0.05   #meters
        track_unknown_space: true   #default space is unknown
        observation_persistence: 0.5  #seconds
        max_obstacle_height: 2.0    #meters
        mark_threshold: 0      #voxel height
        update_footprint_enabled: true
        combination_method: 1      #1=max, 0=override
        obstacle_range: 3.0    #meters
        origin_z: 0.0    #meters
        publish_voxel_map: false   # default off
        transform_tolerance: 0.2    # seconds
        mapping_mode: false  # default off, saves map not for navigation
        map_save_duration: 60.0     #default 60s, how often to autosave
        observation_sources: livox_source realsense_source
        livox_source:
          data_type: PointCloud2
          topic:  /livox/lidar_filtered
          transport_type: "raw"        #default raw -No compression-, Options: zlib, draco, zstd
          marking: true
          clearing: true

          obstacle_range: 8.0
          raytrace_range: 9.0

          min_obstacle_height: 0.1     #default 0, meters
          max_obstacle_height: 1.0     #defaule 3, meters
          expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
          observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest
          inf_is_valid: false          #default false, for laser scans
          clear_after_reading: true    #default false, clear the buffer after the layer gets readings from it
          filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
          voxel_min_points: 0          #default 0, minimum points per voxel for voxel filter
          model_type: 1
          vertical_fov_angle: 2.00      #default 0.7, radians
          vertical_fov_offset: 0.0
          horizontal_fov_angle: 6.28
        realsense_source:
          enabled: true
          data_type: PointCloud2
          topic: /camera/camera/depth/color/points
          transport_type: "raw"
          marking: true
          clearing: true
          obstacle_range: 3.0          #meters, 424x240低分辨率有效探测距离
          raytrace_range: 3.5          #meters, 清除射线范围略大于obstacle_range
          min_z: 0.1                  #meters, 过滤地面
          max_z: 3.5                   #meters, 低分辨率超过3.5m精度差
          min_obstacle_height: 0.1    #meters, 最低障碍物高度
          max_obstacle_height: 1.5     #meters, 哨兵高度以上不关心
          #expected_update_rate: 15.0    #相机掉线时及时告警
          clear_after_reading: true    #高频输入及时清除缓冲
          filter: "voxel"              #降采样减少处理量
          voxel_min_points: 0
          vertical_fov_angle: 1.01     #D435i垂直FOV 58° ≈ 1.01 rad
          vertical_fov_offset: 0.0
          horizontal_fov_angle: 1.52   #D435i水平FOV 87° ≈ 1.52 rad
          decay_acceleration: 1.
          model_type: 0                #depth camera
      always_send_full_costmap: True


